services:
  authservice:
    build:
      context: .
      dockerfile: src/Services/AuthService/src/AuthService.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5000:5000"

  gamingservice:
    build:
      context: .
      dockerfile: src/Services/GamingService/src/GamingService.Presentation/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5020:5020"
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      usersmanagement:
        condition: service_started
      seq: 
        condition: service_started

  gamingoutboxworker:
    build:
      context: .
      dockerfile: src/Services/GamingService/src/GamingService.OutboxWorker/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      mongo:
       condition: service_started
      rabbitmq:
       condition: service_started
      usersmanagement:
       condition: service_started
      seq:
       condition: service_started

  usersmanagement:
    build:
      context: .
      dockerfile: src/Services/UserManagementService/src/UsersManagementService.Presentation/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5010:5010"
      - "5015:5015"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      seq:
        condition: service_started

  postgres:
    image: postgres:latest
    container_name: postgres.users.database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: usersdb
    ports:
      - "5432:5432"
    volumes:
      - ./data/posgres-data:/var/lib/postgresql/data

  mongo:
    image: mongo:latest
    entrypoint:
      - /bin/bash
      - -c
      - |
        cp /data/keyfile /tmp/keyfile \
        && chmod 400 /tmp/keyfile \
        && chown mongodb:mongodb /tmp/keyfile \
        && exec docker-entrypoint.sh mongod \
           --replSet rs0 \
           --bind_ip_all \
           --auth \
           --keyFile /tmp/keyfile
    container_name: mongo.games.database
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo   
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_REPLICA_SET_NAME: rs0
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo-data:/data/db
      - ./data/mongo-keyfile:/data/keyfile:ro

  redis:
    image: redis:latest
    container_name: redis.cache
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:management
    container_name: outbox.rabbitmq
    hostname: rabbitmq
    environment:
        RABBITMQ_DEFAULT_USER: guest
        RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
        - ./data/rabbitmq-data:/var/lib/rabbitmq/data
        - ./data/rabbitmq-logs:/var/log/rabbitmq/log
  seq:
    image: datalust/seq:latest
    container_name: seq
    environment:
      - SEQ_FIRSTRUN_NOAUTHENTICATION=True
      - ACCEPT_EULA=Y
    ports:
     - "5341:80"
     - "8081:80" 
    volumes:
      - ./data/seq-data:/var/lib/seq/data
      - ./data/seq-logs:/var/log/seq/logs

volumes:
  postgres-data:
  mongo-data:
  rabbitmq-data:
  rabbitmq-logs:    
  seq-data:
  seq-logs: