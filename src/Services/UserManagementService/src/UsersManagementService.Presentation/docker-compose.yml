services:
  postgres:
    container_name: postgres
    image: postgres:17
    environment:
      POSTGRES_DB: "usersdb"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "password"
    volumes:
      - ./posgres-data:/var/lib/postgresql/data
    ports:
    - "5432:5432"

volumes:
  postgres-data: 